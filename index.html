<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test HTML</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Test HTML</h1>
        <p>Clique sur le bouton pour tester le JavaScript.</p>

        <button onclick="afficherMessage()">Clique ici</button>

        <p id="message"></p>
    </div>

    <script>
        function afficherMessage() {
            document.getElementById("message").innerHTML = "✅ Ça marche ! Ton code HTML fonctionne.";
        }
    </script>

</body>
</html>
